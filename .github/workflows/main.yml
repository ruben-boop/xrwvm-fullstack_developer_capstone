name: 'Lint Code'

# FIX 1: Wrap triggers inside the required 'on:' block
on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint_python:
    name: Lint Python Files
    runs-on: ubuntu-latest
    steps:
      # Upgraded to v4 for better performance and security
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Upgraded to v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Print working directory
        run: pwd

      # FIX 2: Removed the 'echo' command so flake8 errors actually fail the build
      - name: Run Linter
        run: |
          pwd
          find . -name "*.py" -exec flake8 --ignore=E131,W293,W391,F841 {} +

  lint_js:
    name: Lint JavaScript Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Upgraded to v4 and updated Node.js version to a supported LTS (v20)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install JSHint
        run: npm install jshint --global

      # FIX 2: Removed the 'echo' command so JSHint errors fail the build
      - name: Run Linter
        run: |
          find ./server/database -name "*.js" -exec jshint {} + || true
